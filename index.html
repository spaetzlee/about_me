<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotForge</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') no-repeat center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay {
  backdrop-filter: blur(25px);
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.profile {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 3px solid #38bdf8;
  margin-bottom: 15px;
}

h1 {
  color: #38bdf8;
  margin: 10px 0;
}

p {
  color: #ccc;
}

.links {
  margin-top: 20px;
}

.links a {
  margin: 10px;
  display: inline-block;
  font-size: 28px;
  text-decoration: none;
  transition: 0.2s;
}

.links a:hover {
  transform: scale(1.2);
}
</style>

</head>
<body>

<div class="overlay">
  <img src="profile.png" class="profile">

  <h1>Nico</h1>
  <p>Discord Bot Developer</p>

  <div class="links">
    <!-- Discord -->
    <a href="https://discord.gg/deinlink" title="Discord">💬</a>

    <!-- Website -->
    <a href="https://youtu.be/iik25wqIuFo?si=nxl7r29IADXH880s" title="Website">🌐</a>

    <!-- Steam -->
    <a href="https://steamcommunity.com/id/deinname" title="Steam">🎮</a>
  </div>
</div>

</body>
</html>
