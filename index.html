<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotForge</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') no-repeat center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay {
  backdrop-filter: blur(25px);
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.profile {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 3px solid #38bdf8;
  margin-bottom: 15px;
  object-fit: cover;
}

h1 {
  color: #38bdf8;
  margin: 10px 0;
}

p {
  color: #ccc;
}

.links {
  margin-top: 20px;
}

.links a {
  margin: 10px;
  display: inline-block;
  transition: 0.2s;
}

.links img {
  height: 40px;
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 5px rgba(56,189,248,0.5));
  transition: 0.2s;
}

.links a:hover img {
  transform: scale(1.2);
  filter: drop-shadow(0 0 10px #38bdf8);
}

.links span {
  font-size: 40px;
  display: inline-block;
  transition: 0.2s;
}

.links a:hover span {
  transform: scale(1.2);
}
</style>

</head>
<body>

<div class="overlay">
  <img src="profile.png" class="profile">

  <h1>Nico</h1>
  <p>Discord Bot Develope</p>

  <div class="links">
    
    <!-- Discord -->
    <a href="https://discord.com/users/780506872595742731" target="_blank">
      <img src="discord.png">
    </a>

    <!-- Steam -->
    <a href="https://steamcommunity.com/profiles/76561199360413652/" target="_blank">
      <img src="steam.png">
    </a>

    <!-- Website Emoji -->
    <a href="https://spaetzlee.github.io/botforge" target="_blank">
      <span>🌐</span>
    </a>

    <!-- YouTube -->
    <a href="https://youtu.be/iik25wqIuFo?si=nxl7r29IADXH880s" target="_blank">
      <span>▶️</span>
    </a>

  </div>
</div>

</body>
</html>
